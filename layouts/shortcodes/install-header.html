{{- $active := .Get 0 -}}
<div class="install">
  <div class="install-header">
    <h1>Install</h1>
    <div class="version-badge">
      Latest version: {{ site.Params.latest_version }}
      (<a href="{{ site.Params.latest_relnote_url }}">Release Notes</a>)
    </div>
  </div>

  <nav class="install-tabs" role="tablist" aria-label="Installation options">
    <a href="{{ relURL "install/windows" }}"
       role="tab"
       {{- if eq $active "windows" }} aria-current="page" aria-selected="true"{{ else }} aria-selected="false"{{ end }}>
      <span>Windows</span>
    </a>
    <a href="{{ relURL "install/mac" }}"
       role="tab"
       {{- if eq $active "mac" }} aria-current="page" aria-selected="true"{{ else }} aria-selected="false"{{ end }}>
      <span>macOS</span>
    </a>
    <a href="{{ relURL "install/linux" }}"
       role="tab"
       {{- if eq $active "linux" }} aria-current="page" aria-selected="true"{{ else }} aria-selected="false"{{ end }}>
      <span>Linux</span>
    </a>
    <a href="{{ relURL "install/source" }}"
       role="tab"
       {{- if eq $active "source" }} aria-current="page" aria-selected="true"{{ else }} aria-selected="false"{{ end }}>
      <span>Build from Source</span>
    </a>
  </nav>
